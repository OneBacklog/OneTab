<!DOCTYPE html>
<html lang="en">
  <head>
    <title>New Tab</title>
    <link rel="stylesheet" href="/style.css" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  </head>
  <body>
    <main class="page" id="page">
      <label class="upload-button" for="imageUpload" title="Upload Image" aria-label="Upload Image">
        <img src="/icon.svg" alt="Image" aria-hidden="true" />
      </label>
      <input id="imageUpload" class="file-input" type="file" accept="image/*" />
    </main>
    <script src="/script.js"></script>
  </body>
</html>
